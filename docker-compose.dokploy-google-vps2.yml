# Docker Compose Dokploy — 10 workers Google Reviews (VPS 2 - aureza)
#
# Cible : VPS 2 avec ~7.56 GB RAM, 4 CPU cores
# Couvre les offsets 0 → 387 000 (première moitié de la DB)
#
# Variable env requise :
#   NEON_DATABASE_URL : URL Neon PostgreSQL

services:

  gr-w1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ktipio/gr:latest
    container_name: gr-worker-1
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      SCRIPT: google_reviews_worker.py
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_HEADLESS: "1"
      LOG_LEVEL: "INFO"
    command: ["--offset", "0", "--batch-size", "50", "--delay", "5"]
    restart: unless-stopped
    volumes:
      - ../files/logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: '0.4'
        reservations:
          memory: 300M
          cpus: '0.2'
    networks:
      - gr-net

  gr-w2:
    image: ktipio/gr:latest
    container_name: gr-worker-2
    depends_on: [gr-w1]
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      SCRIPT: google_reviews_worker.py
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_HEADLESS: "1"
