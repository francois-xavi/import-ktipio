# Docker Compose Dokploy — 10 workers Google Reviews (VPS aureza)
#
# Cible : VPS aureza avec ~7.56 GB RAM, 4 CPU cores
# Couvre les offsets 330 000 → 627 000 (tranche du milieu)
#
# Variable env requise :
#   NEON_DATABASE_URL : URL Neon PostgreSQL

services:

  gr-aureza-1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ktipio/gr-aureza:latest
    container_name: gr-aureza-1
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      SCRIPT: google_reviews_worker.py
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_HEADLESS: "1"
      LOG_LEVEL: "INFO"
    command: ["--offset", "0", "--batch-size", "50", "--delay", "5"]
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 600M, cpus: '0.4' }
        reservations: { memory: 300M, cpus: '0.2' }
    networks: [gr-aureza-net]

  gr-aureza-2:
    image: ktipio/gr-aureza:latest
    container_name: gr-aureza-2
    depends_on: [gr-aureza-1]
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
