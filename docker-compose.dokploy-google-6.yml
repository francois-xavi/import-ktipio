# Docker Compose Dokploy — 6 workers Google Reviews (VPS 3 / nouveau Dokploy)
#
# À déployer sur le Dokploy du VPS 3 (le nouveau).
# Reprend les offsets des workers 4, 5, 6, 7, 8, 9 du déploiement nohup initial.
#
# Variable env requise :
#   NEON_DATABASE_URL : URL Neon PostgreSQL

services:

  # ─── GR-4 : reprend worker 4 (offset ~296750) ─────────────────────────────
  gr-w4:
    build:
      context: .
      dockerfile: Dockerfile
    image: ktipio/gr:latest
    container_name: gr-worker-4
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      SCRIPT: google_reviews_worker.py
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_HEADLESS: "1"
      LOG_LEVEL: "INFO"
    command: ["--offset", "296750", "--batch-size", "50", "--delay", "5"]
    restart: unless-stopped
    volumes:
      - ../files/logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 700M
          cpus: '0.5'
        reservations:
          memory: 400M
          cpus: '0.25'
    networks:
      - gr-net

  # ─── GR-5 : reprend worker 5 (offset ~394100) ─────────────────────────────
  gr-w5:
    image: ktipio/gr:latest
    container_name: gr-worker-5
